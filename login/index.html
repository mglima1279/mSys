<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meus Doces</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body id="login-page">
    <div id="app-container" class="auth-container">
        <header id="auth-title">Entrar no Sistema</header>
        <main class="auth-main">
            <a href="../" class="btn-voltar">← Voltar</a>
            
            <form id="form-auth">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input name="email" type="email" id="email" class="form-control" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="password-container">
                        <input name="password" type="password" id="password" class="form-control" placeholder="******" required minlength="6">
                        <button type="button" id="toggle-password" class="btn-eye">MOSTRAR</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-full" id="btn-auth">ENTRAR</button>
            </form>

            <p class="auth-toggle">
                <span id="auth-question">Não tem uma conta?</span>
                <a id="toggle-mode">Cadastre-se</a>
            </p>

        </main>
    </div>

    <script defer type="module" src="../js/login.js"></script>
</body>

</html>
