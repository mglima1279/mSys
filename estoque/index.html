<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Meus Doces</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .add-item-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-remover {
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <header>Estoque</header>
        <main>
            <a href="../" class="btn-voltar">← Voltar</a>

            <div class="add-item-bar">
                <input type="text" id="novo-nome" class="form-control" placeholder="Nome do Produto" style="flex: 2;">
                <input type="number" id="novo-qtd" class="form-control" placeholder="Qtd" value="0" min="0"
                    style="flex: 1;">
                <button id="btn-adicionar" class="btn" style="padding: 10px 15px;">+</button>
            </div>

            <div id="lista-estoque">
                <p style="text-align: center;">Carregando...</p>
            </div>

            <button class="btn btn-full" id="btn-salvar" style="margin-top: 20px;">SALVAR ALTERAÇÕES</button>
        </main>
    </div>

    <script type="module" src="../js/estoque.js"></script>
</body>

</html>
