<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Transação - Meus Doces</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div id="app-container">
        <header>Editar Transação</header>
        <main>
            <a href="../detalhes/" class="btn-voltar">← Voltar</a>

            <form id="form-editar">
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="input-valor" step="0.01" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="input-data" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="input-metodo" class="form-control" required>
                        <option value="pix">PIX</option>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao_credito">Cartão de Crédito</option>
                        <option value="cartao_debito">Cartão de Débito</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="input-desc" class="form-control" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn btn-full" id="btn-salvar">SALVAR ALTERAÇÕES</button>
            </form>
        </main>
    </div>

    <script type="module" src="https://mglima1279.github.io/mSys/js/edit.js"></script>
</body>

</html>
